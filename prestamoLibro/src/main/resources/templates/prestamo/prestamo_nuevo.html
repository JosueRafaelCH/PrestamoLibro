<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
	<header th:replace="~{plantillas/principal :: header}"></header>
	<div class="container py-4 cw-60">
		<div class="card bg-light">
			<div class="card-header">
				<h3 class="text-secondary" th:text="${titulo}"></h3>
			</div>
			<div class="card-body">

                <!-- Para regresar  -->

				<h4 class="card-title text-end">
					<a th:href="@{/prestamolibro/usuarioconsultar/} + ${prestamo.usuario.id}" 
						class="btn btn-sm btn-light" >&laquo; regresar al usuario</a>
				</h4>


                <!-- para guarda formulario de prestamo  -->

				<form method="post" th:object="${prestamo}" th:action="@{/prestamolibro/guardarprestamo}">

                    <!-- campos de usuario -->

					<div class="mb-3 row">
						
						<label class="col-sm-3 col-form-label" th:text="'usuario'"></label>

						<div class="col-sm-9">
							<input type="text" th:value="${prestamo.usuario.nombreCompleto}" class="form-control" disabled="disabled"/>
						</div>
					</div>

					  <!-- campos de prestamo -->

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label" for="fechaPrestamo" th:text="'Fecha de Préstamo*'"></label>
                        <div class="col-sm-9">
                            <input type="date" class="form-control" th:field="*{fechaPrestamo}"/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-3 col-form-label" for="fechaDevolucion" th:text="'Fecha de Devolución*'"></label>
                        <div class="col-sm-9">
                            <input type="date" class="form-control" th:field="*{fechaDevolucion}"/>
                         </div>
                    </div>
					
					<div class="mb-3 row">
						<label class="col-sm-3 col-form-label" for="observacion" th:text="'Observación'"></label>
						<div class="col-sm-9">
							<textarea class="form-control" th:field="*{observacion}"></textarea>
						</div>
					</div>

                    <!-- buscar libro por medio de js -->

					<div class="mb-3 row">
						<label class="col-sm-3 col-form-label" for="buscar_libro">Buscar libro*</label>
						<div class="col-sm-9">
							<input type="text" name="buscar_libro" id="buscar_libro" class="form-control">
							<div id="sugerencias" class="sugerencias-list" style="display: none"></div>
						</div>
					</div>

					<!-- esto es el fracmento  -->


				<table th:replace="~{plantillas/plantilla_detalle :: detalle_prestamo}"></table>

					<!-- cargar detalle viene del controller -->

					<table id="cargar_detalle" class="table table-striped table-sm table-hover table-bordered mt-2">
                        <thead>
                            <tr>
                                <th class="text-secondary">Título</th>
                                <th class="text-secondary">Autor</th>
                                <th class="text-secondary">Editorial</th>
                                <th class="text-secondary">Año</th>
                                <th class="text-secondary">Edición</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
						
                        <tbody>

                        </tbody>
                	</table>


					<div class="mb-3 row mt-4">
						<div class="col-sm-6">
							<input type="submit" th:value="${btn_accion}" class="btn btn-outline-secondary"/>
						</div>
					</div>

				</form>			


			</div>
		</div>	
	</div>

    <!-- script de buscar libro fragmento -->

	<script th:replace="~{plantillas/autocompleta_libro :: script}"></script>
	<footer th:replace="~{plantillas/principal :: footer}" class="bg-light text-center py-3 mt-auto"></footer>


</body>
</html>
