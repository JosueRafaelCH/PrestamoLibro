<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">


<head th:replace="~{plantillas/principal :: head}"></head>

<body>
	<header th:replace="~{plantillas/principal :: header}"></header>
	<div class="container py-4">
		<div class="card bg-light">
			<div class="card-header">
				<h3 class="text-secondary" th:text="${titulo}"></h3>
			</div>
			<div class="card-body shadow-lg p-3">
				<table class="table table-striped table-sm table-bordered" th:if="${not #lists.isEmpty(usuarios)}">
					<tr>
						<th>Id.</th>
						<th sec:authorize="hasRole('USER')">Documento</th>
						<th sec:authorize="hasRole('USER')">Teléfono</th>
						<th>Nombre</th>
						<th sec:authorize="hasRole('USER')">Correo</th>
						<th class="text-center" sec:authorize="hasRole('ADMIN')">Acciones</th>
					</tr>
					<tr th:each="user : ${usuarios}">
						<td>
							
							<a th:href="@{/prestamolibro/usuarioconsultar/{id}(id=${user.id})}" 
							   th:text="${#numbers.formatInteger(user.id, 3)}" 
							   class="btn btn-outline-secondary btn-xs">
							</a>

						</td>

						<td th:text="${user.identificacion}" sec:authorize="hasRole('USER')"></td>
						<td th:text="${user.telefono}" sec:authorize="hasRole('USER')"></td>	
						<td th:text="${user.nombreCompleto}"></td>
						<td th:text="${user.correo}" sec:authorize="hasRole('USER')"></td>
						<td class="text-center" sec:authorize="hasRole('ADMIN')">
							<a th:href="@{/prestamolibro/prestamonuevo/{id}(id=${user.id})}" title="prestarLibro">
								<i class="bi bi-journal-bookmark" style="color: darkgreen"></i>
							</a>&nbsp;
						</td>
					</tr>
				</table>

				<nav th:replace="~{plantillas/paginador :: pager}"></nav>

				<div class="alert alert-warning" th:if="${#lists.isEmpty(usuarios)}">
					No hay usuarios para mostrar
				</div>
			</div>
		</div>
	</div>

	<footer th:replace="~{plantillas/principal :: footer}" class="bg-light text-center py-3 mt-auto"></footer>

</body>
</html>
