<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">


<head th:replace="~{plantillas/principal :: head}"></head>

<style>
  .list-group-item {
    padding-top: 5px;
    padding-bottom: 5px;
  }
</style>

<body>
  <header th:replace="~{plantillas/principal :: header}"></header>
  
  <div class="container py-4">
    <div class="card bg-light">
      <div class="card-header">
        <h3 class="text-secondary" th:text="${titulo}"></h3>
      </div>
      <div class="card-body shadow-lg p-3">
        
        <h4 class="card-title text-end" sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/prestamolibro/prestamonuevo/} + ${usuario.id}" title="prestarLibro" 
            class="btn btn-outline-success btn-sm">prestarLibro</a>&nbsp;
        </h4>
        <ul class="list-group">
          <li class="list-group-item"><b>Identificación: </b><i th:text="${usuario.identificacion}"></i></li>
          <li class="list-group-item"><b>Teléfono: </b><i th:text="${usuario.telefono}"></i></li>
          <li class="list-group-item"><b>Nombre completo: </b><i th:text="${usuario.nombreCompleto}"></i></li>
          <li class="list-group-item"><b>Correo electrónico: </b><i th:text="${usuario.correo}"></i></li>
        </ul>
        <div sec:authorize="hasRole('ADMIN')">
          <h4 class="mt-4 text-secondary" >Préstamos</h4>
          <table th:if="${not #lists.isEmpty(usuario.prestamos)}" 
                class="table table-striped table-bordered table-sm">

              <thead class="table-dark">
                <tr>
                  <th>Nro. Préstamo</th>
                  <th>Fecha de Préstamo</th>
                  <th>Fecha de Devolución</th>
                  <th>Libros</th>
                  <th>Diaz Restantes</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="prestamo : ${usuario.prestamos}">
                  <td th:text="${prestamo.id}"></td>
                  <td th:text="${prestamo.fechaPrestamo}"></td>
                  <td th:text="${prestamo.fechaDevolucion}"></td>

                  <td>
                    <ul>
                      <li th:each="libro : ${prestamo.libros}" 
                          th:text="${libro.titulo + ' - ' + libro.autor}">
                      </li>
                    </ul>
                  </td>

                  <td th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(prestamo.fechaPrestamo, prestamo.fechaDevolucion)} + ' días'"></td>

                
                </tr>
              </tbody>
          </table>
        </div>
        
        <div class="text-right mt-3 text-end">
          <a th:href="@{/prestamolibro/usuarioslistar}" class="btn btn-sm btn-light" style="color: green; font-size: 1.1em;">&laquo; regresar</a>
        </div>
        
      </div>
    </div>
  </div>

  <footer th:replace="~{plantillas/principal :: footer}" class="bg-light text-center py-3 mt-auto"></footer>

 
</body>

</html>
